<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vx-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a" />
      <stop offset="1" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="vx-mark" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#b6ff5a" />
      <stop offset="0.55" stop-color="#5fe36a" />
      <stop offset="1" stop-color="#35c96a" />
    </linearGradient>
    <filter id="vx-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#vx-bg)" />
  <!-- Vertex "Ascension" — two ascending chevrons (growth), glowing -->
  <g filter="url(#vx-glow)">
    <path d="M28 70 L50 51 L72 70 L64 77 L50 63 L36 77 Z" fill="url(#vx-mark)" opacity="0.72" />
    <path d="M28 49 L50 27 L72 49 L63 57 L50 45 L37 57 Z" fill="url(#vx-mark)" />
  </g>
</svg>
